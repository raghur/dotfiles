
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Replace the '❯' symbol in the prompt with '➜'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[❯](bold green)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'
error_symbol = '[✘](bold red)' # The 'error_symbol' segment is being set to '➜' with the color 'bold green'

[cmd_duration]
min_time = 5000
show_notifications = false

[mise]
disabled = true
symbol = '👨‍🍳 '
healthy_symbol = 'active'


[custom.mise_env]
command = "f=\"$MISE_CONFIG_ROOT/.miserc.toml\"; [ -f \"$f\" ] && sed -n 's/env = \\[\"\\(.*\\)\"\\]/\\1/p' \"$f\" 2>/dev/null || echo '—'"
when = "test -n \"$MISE_CONFIG_ROOT\" && case \"$PWD\" in \"$MISE_CONFIG_ROOT\"*) true;; *) false;; esac"
symbol = "👨‍🍳 "
style = "bold yellow"
format = "[$symbol($output)]($style) "

# mise env with dotenv symlink file - legacy
[custom.mise_symlink]
command= 'echo -n $(basename ${DIRENV_NAME:-${DIRENV_FILE:-${$(readlink .env):-NA}}} .env)'
ignore_timeout = true
detect_files = ['.envrc', '.env']
detect_extensions= ['envrc']
style='bold yellow'
symbol = '🎨'
format = '[$symbol $output]($style) '

[dotnet]
symbol =' ' 

[python]
symbol ='󰌠 ' 
style = 'blue bold'

[kubernetes]
format = 'on [$symbol $context]($style) '
symbol = '󱃾'
disabled = false
detect_folders= ['gitops', 'chart']
detect_files= ['Chart.yaml', 'values.yaml']

[[kubernetes.contexts]]
context_pattern = ".*-sandbox0"
style = "green"
context_alias = "Sandbox"

[[kubernetes.contexts]]
context_pattern = ".*-(?P<cluster>preprod|dev|LeManDemo|qa)0"
style = "bold blue"
context_alias = "$cluster"

[[kubernetes.contexts]]
context_pattern = ".*-production0"
style = "bold red"
context_alias = "Production"

[nodejs]
format = '[$symbol $version](bold green) '
symbol = '󰎙'
version_format='v${raw}'

[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "
